<!DOCTYPE html>

<head>

    <style>
        /* Base Apple-style Styles */
        :root {
            --bg-color: #fbfbfd; /* Apple's signature off-white */
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-blue: #0066cc;
            --border-color: #d2d2d7;
            --input-bg: #f5f5f7;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 540px;
            padding: 60px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo */
        .logo {
            max-width: 140px;
            height: auto;
            margin-bottom: 24px;
        }

        /* Typography */
        .description {
            margin-bottom: 40px;
        }
        .description h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.015em;
            margin: 0 0 12px 0;
            color: var(--text-main);
        }
        .description p {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-muted);
            line-height: 1.47059;
            letter-spacing: -0.022em;
            margin: 0;
        }

        /* Mailchimp Form Override (The "Apple Card" Look) */
        .form-container {
            width: 100%;
            background: var(--card-bg);
            border-radius: 18px;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04), 0 2px 10px rgba(0,0,0,0.02); 
        }

        #mc_embed_signup {
            text-align: left;
        }

        /* Hide Mailchimp's ugly default title and required asterisks */
        #mc_embed_signup h2, 
        #mc_embed_signup .indicates-required,
        #mc_embed_signup .asterisk {
            display: none !important;
        }

        #mc_embed_signup .mc-field-group {
            margin-bottom: 20px;
            padding-bottom: 0;
            min-height: auto;
            width: 100%;
        }

        #mc_embed_signup label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        /* High-end Input Fields */
        #mc_embed_signup input[type="text"], 
        #mc_embed_signup input[type="email"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 17px;
            border-radius: 12px;
            border: 1px solid transparent;
            background-color: var(--input-bg);
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        /* Apple-style Focus Ring */
        #mc_embed_signup input[type="text"]:focus, 
        #mc_embed_signup input[type="email"]:focus {
            outline: none;
            background-color: var(--card-bg);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.15);
        }

        /* Premium Pill Button */
        #mc_embed_signup input[type="submit"] {
            width: 100%;
            background-color: var(--text-main);
            color: #ffffff;
            border: none;
            border-radius: 980px; /* Forces pill shape */
            font-size: 17px;
            font-weight: 600;
            padding: 16px 24px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }

        #mc_embed_signup input[type="submit"]:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Error/Success Messages */
        #mce-responses {
            margin-top: 16px;
            font-size: 14px;
        }
        #mce-error-response { color: #e30000; font-weight: 500; }
        #mce-success-response { color: #008a00; font-weight: 500; }

        /* Social Links */
        .social-links {
            margin-top: 48px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .social-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 980px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .social-links a:hover {
            color: var(--text-main);
            border-color: var(--text-main);
            transform: translateY(-1px);
        }
    </style>
</head>
